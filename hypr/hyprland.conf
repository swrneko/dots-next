# -------- #
# KEYBINDS #
# -------- #

$mainMod = SUPER
$terminal = kitty
$fileManager = nemo
$browser = zen-browser
$prcsDispatcher = $terminal -e btop
$menu = qs -c noctalia-shell ipc call launcher toggle

# -------- #
# DISPLAYS #
# -------- #
# Universal monitor setup
monitor=,preferred,auto,auto

# --------- #
# AUTOSTART #
# --------- #
# Core components
exec-once = hyprpm reload 
exec-once = hyprlock
exec-once = qs -c noctalia-shell 

# System services
exec-once = /usr/lib/xdg-desktop-portal-hyprland &
exec-once = /usr/lib/xdg-desktop-portal-gtk &
exec-once = xrdb ~/.Xresources
exec-once = xembedsniproxy # For wine tray integration

# User Applications (Uncomment what you need)
# exec-once = Telegram -startintray 
# exec-once = [workspace 10 silent] steam -silent 
# exec-once = [workspace 10 silent] discord --start-minimized
# exec-once = [workspace 1 silent] zen-browser 
# exec-once = udiskie -s -m flat --menu-update-workaround
# exec-once = /opt/v2rayn-bin/v2rayN
# exec-once = wayvnc 0.0.0.0 5900 # Warning: Opens VNC to local network
# exec-once = otd-daemon # OpenTabletDriver
# exec-once = cpupower frequency-set -g performance # Might require sudo setup

# -------------------- #
# ENVIRONMENT VARIBLES #
# -------------------- #
env = XDG_CURRENT_DESKTOP,Hyprland
env = QT_SCALE_FACTORS=1.3
env = QT_ENABLE_HIGHDPI_SCALING,1
env = QT_FONT_DPI,81
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = GTK_SCALE,1
env = GDK_DPI_SCALE,1
env = QT_QPA_PLATFORMTHEME,qt5ct
env = XCURSOR_SIZE,24
env = WLR_NO_HARDWARE_CURSORS,1
env = QT_QPA_PLATFORM, wayland;xcb
env = QT_SCALE_FACTOR_ROUNDING_POLICY,RoundPreferFloor 
env = HYPRCURSOR_THEME,"afterglow"
env = HYPRCURSOR_SIZE,24
env = GTK_USE_PORTAL,1 

# --- NVIDIA FIXES (Uncomment if you use an Nvidia GPU) ---
# env = LIBVA_DRIVER_NAME,nvidia
# env = XDG_SESSION_TYPE,wayland
# env = GBM_BACKEND,nvidia-drm
# env = __GLX_VENDOR_LIBRARY_NAME,nvidia

# ------- #
# GENERAL #
# ------- #

# WARNING: If you haven't installed the dynamic-cursors plugin via hyprpm, 
# comment this block out, otherwise Hyprland will show an error on startup.
plugin:dynamic-cursors {
    enabled = true
    mode = tilt
    threshold = 1
    rotate {
        length = 20
        offset = 0.0
    }
    tilt {
        limit = 5000
        function = negative_quadratic
        window = 100
        full_tilt = 60
    }
    stretch {
        limit = 3000
        function = quadratic
        window = 100
    }
    shake {
        enabled = false
    }
    hyprcursor {
        nearest = true
        enabled = true
        resolution = -1
        fallback = clientside
    }
}

general {
    gaps_in = 5
    gaps_out = 15
    border_size = 3
    col.active_border = rgb(7366bd)
    col.inactive_border = rgb(4c4f69)
    layout = dwindle
    allow_tearing = false 
    resize_on_border = true
    extend_border_grab_area = 15
}

input {
    kb_layout = us, ru
    kb_options = grp:win_space_toggle
    force_no_accel = 1
    follow_mouse = 1
    touchpad {
        natural_scroll = no
    }
    sensitivity = 0 
}

dwindle {
    pseudotile = yes 
    preserve_split = yes 
    force_split = 2
}

cursor {
    no_warps = true
    no_hardware_cursors = true
}

xwayland {
    enabled = true
    force_zero_scaling = true
    use_nearest_neighbor = true
}

group {
    auto_group = false
}

misc {
    force_default_wallpaper = 0 
    disable_hyprland_logo = true
    layers_hog_keyboard_focus = true
}

# ----------- #
# DECORATIONS # 
# ----------- #

decoration {
    rounding = 18
    active_opacity = 1.0
    fullscreen_opacity = 1.0
    blur {
        enabled = true
        size = 8
        passes = 3
        new_optimizations = true
        popups = false
        popups_ignorealpha = 0.15
        ignore_opacity = true
    }
    shadow {
        enabled = false
    }
    dim_inactive = true
    dim_strength = 0.25
    dim_around = 0.1
    layerrule = blur on, match:namespace waybar
    layerrule = ignore_alpha 1, match:namespace waybar
    layerrule = animation fade, match:namespace logout_dialog
    layerrule = animation fade, match:namespace selection
    layerrule = blur on, match:namespace noctalia-background-.*$
    layerrule = ignore_alpha 0.35, match:namespace noctalia-background-.*$
}

# ---------- #
# ANIMATIONS #
# ---------- #

animations {
    enabled = yes
    bezier = wind, 0.05, 0.9, 0.1, 1
    bezier = winIn, 0.1, 1, 0.1, 1.05
    bezier = layIn, 0.1, 1, 0.1, 1.1
    bezier = layOut, 0.3, 0, 0, 1
    bezier = winOut, 0.3, 0, 0, 1
    bezier = liner, 1, 1, 1, 1
    animation = windows, 1, 6, wind, slide
    animation = windowsIn, 1, 6, winIn, slide
    animation = windowsOut, 1, 6, winOut, slide
    animation = windowsMove, 1, 6, wind, slide
    animation = border, 1, 1, liner
    animation = borderangle, 1, 30, liner, loop
    animation = fade, 1, 10, default
    animation = workspaces, 1, 5, wind
    animation = specialWorkspaceIn, 1, 5, winIn, slidevert
    animation = specialWorkspaceOut, 1, 6, winOut, slidevert
    animation = layersIn, 1, 5, layIn, slide
    animation = layersOut, 1, 5, layOut, slide
}

# Program launch
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, Y, exec, $browser
bind = $mainMod, D, exec, $menu
bind = $mainMod, U, exec, $prcsDispatcher

# Window mode
bind = $mainMod, M, togglespecialworkspace, magic
bind = $mainMod SHIFT, F, Fullscreen
bind = $mainMod SHIFT, T, togglesplit 
bind = $mainMod SHIFT, M, movetoworkspace, special:magic
bind = $mainMod SHIFT, S, togglefloating 
bind = $mainMod SHIFT, P, pseudo 

# System keybinds
bind = $mainMod SHIFT, Q, killactive, 
bind = $mainMod SHIFT ALT, E, exit, 

# Brightness keybinds
binde=, XF86MonBrightnessDown, exec, brightnessctl set 2%-
binde=, XF86MonBrightnessUp, exec, brightnessctl set +2% 

# Music & Volume keybinds (using WirePlumber)
binde = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 5%+
binde = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind  = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind  = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bind  = , XF86AudioPlay, exec, playerctl play-pause

# Super Tab Feature
bind = $mainMod, Tab, cyclenext, prev
bind = ALT, Tab, bringactivetotop

# Make screenshot (Saves to ~/Pictures/Screenshots)
bind = , Print, exec, grim -g "$(slurp -d)" - | wl-copy
bind = SHIFT, Print, exec, mkdir -p ~/Pictures/Screenshots && grim -g "$(slurp -d)" - | tee ~/Pictures/Screenshots/$(date +'%Y-%m-%d-%H%M%S').png | wl-copy

# Move focus with mainMod + HJKL
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d
bind = $mainMod SHIFT, N, focuswindow, tiled
bind = $mainMod, N, focuswindow, floating

# Resize focus with mainMod + HJKL
binde = $mainMod CONTROL, H, resizeactive, -20 0
binde = $mainMod CONTROL, L, resizeactive, 20 0
binde = $mainMod CONTROL, K, resizeactive, 0 -20
binde = $mainMod CONTROL, J, resizeactive, 0 20

# Move window
bind = $mainMod SHIFT, H, swapwindow, l
bind = $mainMod SHIFT, L, swapwindow, r
bind = $mainMod SHIFT, K, swapwindow, u
bind = $mainMod SHIFT, J, swapwindow, d

bind = $mainMod ALT, H, movewindow, l
bind = $mainMod ALT, L, movewindow, r
bind = $mainMod ALT, K, movewindow, u
bind = $mainMod ALT, J, movewindow, d

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# ------------ #
# WINDOW RULES #
# ------------ #
windowrule = float on, match:class Waydroid 
windowrule = fullscreen on, match:class Waydroid 
windowrule = float on, match:class Waydroid 

windowrule = match:xwayland 1, no_blur on
windowrule = match:xwayland 1, match:float 1, no_initial_focus on
windowrule = match:float 1, no_dim on

windowrule {
    name = dialogs-float-center
    match:title = ^(Open|Save|Choose|Select|Library|File Upload|Choose wallpaper)(.*)$
    float = on
    center = on
}

workspace = 1, defaultName:一
workspace = 2, defaultName:二
workspace = 3, defaultName:三
workspace = 4, defaultName:四
workspace = 5, defaultName:五
workspace = 6, defaultName:六
workspace = 7, defaultName:七
workspace = 8, defaultName:八
workspace = 9, defaultName:九
workspace = 10, defaultName:十
