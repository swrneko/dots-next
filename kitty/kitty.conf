# Font size
font_size 13.0

cursor_shape block
cursor_trail 10
wayland_titlebar_color system
linux_display_server wayland

shell_integration no-cursor

# Disable noise sound
enable_audio_bell no

##########
# COLORS #
##########

# MAIN
foreground #F5F3F2
background #1a1b26
background_opacity 0.5

# BLACK
color0 #151720
color8 #151720

# RED
color1 #ff7a93
color9 #ff7a93

# GREEN
color2  #94e2d5
color10 #94e2d5

# YELLOW
color3  #eed49f
color11 #eed49f

# BLUE
color4  #bb9af7
color12 #bb9af7

# MANGETA
color5  #c6a0f6
color13 #c6a0f6

# CYAN
color6  #b7bdf8
color14 #b7bdf8

# WHITE
color7  #F5F3F2
color15 #F5F3F2

# BEGIN_KITTY_FONTS
font_family      family="0xProto Nerd Font Mono"
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS
